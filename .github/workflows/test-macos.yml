name: macOS

on:
  push:
    branches: [main, copilot/**]
    paths:
      - 'install.sh'
      - '.github/workflows/test-macos.yml'
  pull_request:
    paths:
      - 'install.sh'
      - '.github/workflows/test-macos.yml'

permissions:
  contents: read

jobs:
  test:
    if: ${{ !github.event.pull_request || github.event.pull_request.head.repo.full_name == 'noor-latif/get-flox' }}
    name: Install on ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-15-arm64
            runs_on: macos-15
          - name: macos-15-intel
            runs_on: macos-15-intel
          - name: macos-14-arm64
            runs_on: macos-14
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Run install.sh
        run: |
          REF="${{ github.event.pull_request.head.ref || github.ref_name }}"
          curl -sSf https://raw.githubusercontent.com/noor-latif/get-flox/$REF/install.sh | bash

      - name: Verify flox
        run: |
          command -v flox
          flox --version
