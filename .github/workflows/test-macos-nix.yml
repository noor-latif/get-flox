name: macOS + Nix

on:
  push:
    branches: [main, copilot/**]
    paths:
      - 'install.sh'
      - '.github/workflows/test-macos-nix.yml'
  pull_request:
    paths:
      - 'install.sh'
      - '.github/workflows/test-macos-nix.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ !github.event.pull_request || github.event.pull_request.head.repo.full_name == 'noor-latif/get-flox' }}
    timeout-minutes: 15
    name: Install on ${{ matrix.runs_on }} with Determinate Nix
    strategy:
      fail-fast: false
      matrix:
        runs_on: [macos-26, macos-15, macos-14]
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Install Determinate Nix
        uses: DeterminateSystems/nix-installer-action@7ecf22d8547128d1e8317f20a604c3e2d3125e1a

      - name: Run install.sh
        run: |
          REF="${{ github.event.pull_request.head.ref || github.ref_name }}"
          curl -sSf https://raw.githubusercontent.com/noor-latif/get-flox/$REF/install.sh | bash

      - name: Verify flox
        run: |
          flox --version
