name: Amazon Linux

on:
  push:
    branches: [main, copilot/**]
    paths:
      - 'install.sh'
      - '.github/workflows/test-amazonlinux.yml'
  pull_request:
    paths:
      - 'install.sh'
      - '.github/workflows/test-amazonlinux.yml'

permissions:
  contents: read

jobs:
  test:
    if: ${{ !github.event.pull_request || github.event.pull_request.head.repo.full_name == 'noor-latif/get-flox' }}
    name: Install on amazonlinux-2023
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Run install.sh (Containerized)
        run: |
          REF="${{ github.event.pull_request.head.ref || github.ref_name }}"
          docker run --rm amazonlinux:2023 \
            /bin/bash -eux -c "if ! command -v curl &>/dev/null; then yum -y install curl; fi; curl -sSf https://raw.githubusercontent.com/noor-latif/get-flox/$REF/install.sh | bash && flox --version"
