name: Amazon Linux

on:
  push:
    tags-ignore:
      - latest

permissions:
  contents: read

jobs:
  test:
    name: Install on amazonlinux-2023
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Run install.sh (Containerized)
        run: |
          docker run --rm amazonlinux:2023 \
            /bin/bash -eux -c "if ! command -v curl &>/dev/null; then yum -y install curl; fi; curl -sSf https://raw.githubusercontent.com/noor-latif/get-flox/${{ github.sha }}/install.sh | bash && flox --version"
