name: NixOS

on: [push]

permissions:
  contents: read

jobs:
  test:
    name: Install on ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: NixOS-x86_64
            runs_on: ubuntu-latest
            method: nixos-docker
          - name: NixOS-arm64
            runs_on: ubuntu-24.04-arm
            method: nixos-docker
          - name: Ubuntu-Generic-Nix
            runs_on: ubuntu-latest
            method: generic-nix
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Nix (for generic-nix)
        if: matrix.method == 'generic-nix'
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Run install.sh (NixOS Docker)
        if: matrix.method == 'nixos-docker'
        run: |
          docker run --rm nixos/nix:latest \
            /bin/sh -c "curl -sSf https://raw.githubusercontent.com/noor-latif/get-flox/${{ github.sha }}/install.sh | bash && flox --version"

      - name: Run install.sh (Generic Nix)
        if: matrix.method == 'generic-nix'
        run: |
          curl -sSf https://raw.githubusercontent.com/noor-latif/get-flox/${{ github.sha }}/install.sh | bash
          flox --version
