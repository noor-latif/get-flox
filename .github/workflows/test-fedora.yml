name: Fedora

on: [push]

permissions:
  contents: read

jobs:
  test:
    name: Install on ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fedora-x86_64
            runs_on: ubuntu-latest
          - name: fedora-arm
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Run install.sh (Containerized)
        run: |
          docker run --rm registry.fedoraproject.org/fedora:latest \
            /bin/bash -eux -c "if ! command -v curl &>/dev/null; then dnf -y install curl; fi; curl -sSf https://raw.githubusercontent.com/noor-latif/get-flox/${{ github.sha }}/install.sh | bash && flox --version"
